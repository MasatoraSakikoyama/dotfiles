# キーストロークのディレイを減らす
set -sg escape-time 1

# 分割時にカレントディレクトリを引き継ぐ
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# Vim ライクにペインを移動する
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# Vim ライクにペインをリサイズする
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# 現行 tmux 向けの端末設定
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB"

# ステータスバーと表示色
set -g status-position top
set -g status-left-length 90
set -g status-right-length 90
set -g status-justify centre
set -g status-style fg=white,bg=black
set -g status-left "#H:[#P]"
set -g status-right "#[fg=green]Session: #S #[fg=yellow]#I #[fg=cyan]#P"
setw -g window-status-style fg=cyan,bg=default
setw -g window-status-current-style fg=white,bg=red,bold
set -g pane-border-style fg=green
set -g pane-active-border-style fg=yellow
set -g message-style fg=white,bg=black,bold

# コピーモードで vi キーバインドを使う
setw -g mode-keys vi
